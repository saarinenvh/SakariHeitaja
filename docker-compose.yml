services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=Europe/Helsinki
      - LLM_ENABLED=true
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - DATA_DIR=/app/data
    volumes:
      - /srv/sakke/data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
